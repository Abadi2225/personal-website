    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        html { scroll-behavior: smooth; cursor: none; }
        @media (hover: none) { html { cursor: auto; } .custom-cursor { display: none !important; } }
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .scanlines { background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.02)); background-size: 100% 4px; position: fixed; top: 0; right: 0; bottom: 0; left: 0; pointer-events: none; z-index: 50; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }

        /* SYSTEM CORE */
        .core-scene { width: 260px; height: 260px; perspective: 1000px; transform-style: preserve-3d; }
        .loader-sphere { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: sphereRotate 30s linear infinite; }
        .load-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; transform-style: preserve-3d; }
        .load-ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(56, 189, 248, 0.05); }
        .load-ring::after { content: ''; position: absolute; inset: -1px; border-radius: 50%; border: 2px solid transparent; border-top-color: #38bdf8; border-right-color: #38bdf8; animation: loaderSpin 4s linear infinite, loaderPulse 3s ease-in-out infinite alternate; box-shadow: 0 0 8px rgba(56, 189, 248, 0.2); }
        @keyframes sphereRotate { 0% { transform: rotateY(0deg) rotateX(0deg); } 100% { transform: rotateY(360deg) rotateX(0deg); } }
        @keyframes loaderSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes loaderPulse { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.4; } }
        .lr-1 { transform: rotateY(0deg); } .lr-2 { transform: rotateY(30deg); } .lr-3 { transform: rotateY(60deg); } .lr-4 { transform: rotateY(90deg); } .lr-5 { transform: rotateY(120deg); } .lr-6 { transform: rotateY(150deg); } .lr-7 { transform: rotateX(90deg) rotateY(0deg); } .lr-8 { transform: rotateX(90deg) rotateY(30deg); } .lr-9 { transform: rotateX(90deg) rotateY(60deg); } .lr-10 { transform: rotateX(90deg) rotateY(90deg); } .lr-11 { transform: rotateX(90deg) rotateY(120deg); } .lr-12 { transform: rotateX(90deg) rotateY(150deg); }
        .load-ring:nth-child(odd)::after { animation-duration: 6s; animation-delay: 0.5s; } .load-ring:nth-child(even)::after { animation-duration: 4s; animation-direction: reverse; }
    </style>
</head>
<body>

        // --- 1. Cursor ---
        const CustomCursor = () => {
            const cursorX = useMotionValue(-100);
            const cursorY = useMotionValue(-100);
            const [isHovering, setIsHovering] = useState(false);
            const springConfig = { damping: 80, stiffness: 2000 };
            const cursorXSpring = useSpring(cursorX, springConfig);
            const cursorYSpring = useSpring(cursorY, springConfig);

            useEffect(() => {
                const moveCursor = (e) => { cursorX.set(e.clientX); cursorY.set(e.clientY); };
                const handleMouseOver = (e) => setIsHovering(!!(e.target.closest('a') || e.target.closest('button') || e.target.closest('.interactive-card')));
                window.addEventListener('mousemove', moveCursor);
                window.addEventListener('mouseover', handleMouseOver);
                return () => { window.removeEventListener('mousemove', moveCursor); window.removeEventListener('mouseover', handleMouseOver); };
            }, []);

            return (
                <div className="custom-cursor pointer-events-none fixed inset-0 z-[9999] hidden md:block">
                    <motion.div className="absolute w-1.5 h-1.5 bg-accent rounded-full" style={{ x: cursorX, y: cursorY, translateX: '-50%', translateY: '-50%' }} />
                    <motion.div className="absolute rounded-full border border-accent/30"
                        style={{ x: cursorXSpring, y: cursorYSpring, translateX: '-50%', translateY: '-50%' }}
                        animate={{ width: isHovering ? 50 : 24, height: isHovering ? 50 : 24, opacity: isHovering ? 1 : 0.5, scale: isHovering ? 1.1 : 1 }}
                        transition={{ type: "spring", stiffness: 300, damping: 20 }} />
                </div>
            );
        };

        // --- 2. Components ---
        const SystemCore = () => (

                </div>
            </div>
        );

        const Navbar = () => {
            const [isOpen, setIsOpen] = useState(false);
            const scrollTo = (id) => { setIsOpen(false); document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); };

            return (

                    </div>
                    <AnimatePresence>
                        {isOpen && (

        const Hero = () => (

                <div className="ml-4 md:ml-16 flex flex-col md:flex-row items-center md:items-center justify-between gap-12">
